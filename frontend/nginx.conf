server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (higher priority than static asset regex)
    location ^~ /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running analysis and compliance checks
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;

        # Allow large file uploads
        client_max_body_size 50M;
    }

    # Cache static assets (excludes /api/ paths due to ^~ above)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # CSS/JS: short cache with revalidation so updates are picked up quickly
    location ~* \.(css|js)$ {
        expires 1m;
        add_header Cache-Control "public, must-revalidate";
    }
}
