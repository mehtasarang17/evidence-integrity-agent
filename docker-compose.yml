services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evidence_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evidence_secure_pass_2024}
      POSTGRES_DB: ${POSTGRES_DB:-evidence_integrity}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evidence_user} -d ${POSTGRES_DB:-evidence_integrity}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5002:5000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-evidence_user}:${POSTGRES_PASSWORD:-evidence_secure_pass_2024}@postgres:5432/${POSTGRES_DB:-evidence_integrity}
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-south-1}
      - BEDROCK_MODEL=${BEDROCK_MODEL:-apac.amazon.nova-lite-v1:0}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-amazon.titan-embed-text-v2:0}
      - COMPLIANCE_AWS_ACCESS_KEY=${COMPLIANCE_AWS_ACCESS_KEY:-}
      - COMPLIANCE_AWS_SECRET_KEY=${COMPLIANCE_AWS_SECRET_KEY:-}
      - COMPLIANCE_AWS_REGION=${COMPLIANCE_AWS_REGION:-ap-south-1}
      - COMPLIANCE_AWS_ACCOUNT_ID=${COMPLIANCE_AWS_ACCOUNT_ID:-}
      - COMPLIANCE_AWS_IAM_USERNAME=${COMPLIANCE_AWS_IAM_USERNAME:-}
      - COMPLIANCE_AWS_IAM_PASSWORD=${COMPLIANCE_AWS_IAM_PASSWORD:-}
      - COMPLIANCE_AZURE_ACCESS_TOKEN=${COMPLIANCE_AZURE_ACCESS_TOKEN:-}
      - COMPLIANCE_AZURE_TENANT_ID=${COMPLIANCE_AZURE_TENANT_ID:-}
      - COMPLIANCE_AZURE_CLIENT_ID=${COMPLIANCE_AZURE_CLIENT_ID:-}
      - COMPLIANCE_AZURE_CLIENT_SECRET=${COMPLIANCE_AZURE_CLIENT_SECRET:-}
      - COMPLIANCE_GCP_ACCESS_TOKEN=${COMPLIANCE_GCP_ACCESS_TOKEN:-}
      - COMPLIANCE_GCP_SCOPE=${COMPLIANCE_GCP_SCOPE:-}
      - COMPLIANCE_GCP_PROJECT_IDS=${COMPLIANCE_GCP_PROJECT_IDS:-}
      - COMPLIANCE_IBM_CLOUD_API_KEY=${COMPLIANCE_IBM_CLOUD_API_KEY:-}
      - COMPLIANCE_OCI_TENANCY_OCID=${COMPLIANCE_OCI_TENANCY_OCID:-}
      - COMPLIANCE_OCI_USER_OCID=${COMPLIANCE_OCI_USER_OCID:-}
      - COMPLIANCE_OCI_FINGERPRINT=${COMPLIANCE_OCI_FINGERPRINT:-}
      - COMPLIANCE_OCI_PRIVATE_KEY=${COMPLIANCE_OCI_PRIVATE_KEY:-}
      - COMPLIANCE_OCI_PRIVATE_KEY_PATH=${COMPLIANCE_OCI_PRIVATE_KEY_PATH:-}
      - COMPLIANCE_OCI_PASSPHRASE=${COMPLIANCE_OCI_PASSPHRASE:-}
      - COMPLIANCE_OCI_REGION=${COMPLIANCE_OCI_REGION:-us-ashburn-1}
      - COMPLIANCE_GITHUB_TOKEN=${COMPLIANCE_GITHUB_TOKEN:-}
      - COMPLIANCE_GITLAB_TOKEN=${COMPLIANCE_GITLAB_TOKEN:-}
      - COMPLIANCE_GITLAB_BASE_URL=${COMPLIANCE_GITLAB_BASE_URL:-https://gitlab.com}
      - COMPLIANCE_SLACK_TOKEN=${COMPLIANCE_SLACK_TOKEN:-}
      - COMPLIANCE_TEAMS_ACCESS_TOKEN=${COMPLIANCE_TEAMS_ACCESS_TOKEN:-}
      - COMPLIANCE_TEAMS_TENANT_ID=${COMPLIANCE_TEAMS_TENANT_ID:-}
      - COMPLIANCE_TEAMS_CLIENT_ID=${COMPLIANCE_TEAMS_CLIENT_ID:-}
      - COMPLIANCE_TEAMS_CLIENT_SECRET=${COMPLIANCE_TEAMS_CLIENT_SECRET:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-evidence-integrity-agent}
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
    shm_size: '2gb'
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - screenshots:/app/screenshots
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  monitoring-worker:
    build: ./backend
    command: ["python", "monitoring_worker.py"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-evidence_user}:${POSTGRES_PASSWORD:-evidence_secure_pass_2024}@postgres:5432/${POSTGRES_DB:-evidence_integrity}
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-south-1}
      - BEDROCK_MODEL=${BEDROCK_MODEL:-apac.amazon.nova-lite-v1:0}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-amazon.titan-embed-text-v2:0}
      - COMPLIANCE_AWS_ACCESS_KEY=${COMPLIANCE_AWS_ACCESS_KEY:-}
      - COMPLIANCE_AWS_SECRET_KEY=${COMPLIANCE_AWS_SECRET_KEY:-}
      - COMPLIANCE_AWS_REGION=${COMPLIANCE_AWS_REGION:-ap-south-1}
      - COMPLIANCE_AWS_ACCOUNT_ID=${COMPLIANCE_AWS_ACCOUNT_ID:-}
      - COMPLIANCE_AWS_IAM_USERNAME=${COMPLIANCE_AWS_IAM_USERNAME:-}
      - COMPLIANCE_AWS_IAM_PASSWORD=${COMPLIANCE_AWS_IAM_PASSWORD:-}
      - COMPLIANCE_AZURE_ACCESS_TOKEN=${COMPLIANCE_AZURE_ACCESS_TOKEN:-}
      - COMPLIANCE_AZURE_TENANT_ID=${COMPLIANCE_AZURE_TENANT_ID:-}
      - COMPLIANCE_AZURE_CLIENT_ID=${COMPLIANCE_AZURE_CLIENT_ID:-}
      - COMPLIANCE_AZURE_CLIENT_SECRET=${COMPLIANCE_AZURE_CLIENT_SECRET:-}
      - COMPLIANCE_GCP_ACCESS_TOKEN=${COMPLIANCE_GCP_ACCESS_TOKEN:-}
      - COMPLIANCE_GCP_SCOPE=${COMPLIANCE_GCP_SCOPE:-}
      - COMPLIANCE_GCP_PROJECT_IDS=${COMPLIANCE_GCP_PROJECT_IDS:-}
      - COMPLIANCE_IBM_CLOUD_API_KEY=${COMPLIANCE_IBM_CLOUD_API_KEY:-}
      - COMPLIANCE_OCI_TENANCY_OCID=${COMPLIANCE_OCI_TENANCY_OCID:-}
      - COMPLIANCE_OCI_USER_OCID=${COMPLIANCE_OCI_USER_OCID:-}
      - COMPLIANCE_OCI_FINGERPRINT=${COMPLIANCE_OCI_FINGERPRINT:-}
      - COMPLIANCE_OCI_PRIVATE_KEY=${COMPLIANCE_OCI_PRIVATE_KEY:-}
      - COMPLIANCE_OCI_PRIVATE_KEY_PATH=${COMPLIANCE_OCI_PRIVATE_KEY_PATH:-}
      - COMPLIANCE_OCI_PASSPHRASE=${COMPLIANCE_OCI_PASSPHRASE:-}
      - COMPLIANCE_OCI_REGION=${COMPLIANCE_OCI_REGION:-us-ashburn-1}
      - COMPLIANCE_GITHUB_TOKEN=${COMPLIANCE_GITHUB_TOKEN:-}
      - COMPLIANCE_GITLAB_TOKEN=${COMPLIANCE_GITLAB_TOKEN:-}
      - COMPLIANCE_GITLAB_BASE_URL=${COMPLIANCE_GITLAB_BASE_URL:-https://gitlab.com}
      - COMPLIANCE_SLACK_TOKEN=${COMPLIANCE_SLACK_TOKEN:-}
      - COMPLIANCE_TEAMS_ACCESS_TOKEN=${COMPLIANCE_TEAMS_ACCESS_TOKEN:-}
      - COMPLIANCE_TEAMS_TENANT_ID=${COMPLIANCE_TEAMS_TENANT_ID:-}
      - COMPLIANCE_TEAMS_CLIENT_ID=${COMPLIANCE_TEAMS_CLIENT_ID:-}
      - COMPLIANCE_TEAMS_CLIENT_SECRET=${COMPLIANCE_TEAMS_CLIENT_SECRET:-}
      - MONITORING_REFRESH_INTERVAL_SECONDS=${MONITORING_REFRESH_INTERVAL_SECONDS:-300}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - screenshots:/app/screenshots
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  screenshots:
